name: radharadha
description: Radha Radha - Play sacred audio on a repeating interval
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  record: ^7.0.0

  # Background Service
  flutter_foreground_task: ^8.0.2

  # File Management
  file_picker: ^8.0.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # Phone Call Detection
  phone_state: ^2.1.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.3.3
  intl: 0.20.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/lottie/
